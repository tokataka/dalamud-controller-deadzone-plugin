name: CI
run-name: ${{ github.ref_name }}

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  SOLUTION_FILE: ControllerDeadzone.slnx
  TEST_PROJECT: ControllerDeadzone.Tests/ControllerDeadzone.Tests.csproj
  DALAMUD_DISTRIB_URL: https://goatcorp.github.io/dalamud-distrib/latest.zip

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup plugin build
        uses: ./.github/actions/setup-plugin-build

      - name: Restore
        run: dotnet restore $env:SOLUTION_FILE --locked-mode

      - name: Build
        run: dotnet build $env:SOLUTION_FILE -c Release --no-restore -p:Platform=x64

      - name: Test
        run: dotnet run --project $env:TEST_PROJECT -c Release --no-build -p:Platform=x64
